<!DOCTYPE html>
<html>
    <!--Tables and borders-->
    <head>
        <title>Fruit Table</title>
    </head>
    <body>
       <table border="1">
        <caption>Fruit Sales</caption>
         <thead>
            <tr>
                <th>Fruit</th>
                <th>Price</th>
            </tr>
         </thead>
         <tfoot>
            <tr>
              <td>Total</td>  
              <td>$6560</td>
            </tr>
         </tfoot>
         <tbody>
            <tr>
                <td>Apple</td>
                <td>$1230</td>
            </tr>
            <tr>
                <td>Orange</td>
                <td>$780</td>
            </tr>
            <tr>
                <td>Pear</td>
                <td>$240</td>
            </tr>
            <tr>
                <td>Banana</td>
                <td>$4235</td>
            </tr>
            <tr>
                <td>Lemon</td>
                <td>$75</td>
            </tr>
         </tbody>
       </table> 
    </body>
</html>
