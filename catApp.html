<!DOCTYPE html>
<html lang="en">
    <head>
        <title>ISMS 121 CatPhoto App</title>
    </head>
    <body>
        <main>
            <h1>CatPhoto App</h1>
            <section>
                <h2> Cat Photos</h2>
                <!--TODO: Add link to cat photos-->
                <p>See More: <a href="https://www.freecatphotoapp.com"
                    target="_blank">cat photos</a> in our gallery</p>
                <a href="https://www.freecatphotoapp.com" target="_blank">
                 <img src="https://bit.ly/fcc-relaxing-cat" alt="Relaxing Cat">
                </a>
            </section>
            <section>
                <h2>Cat Lists</h2>
                <h3>Things Cat Love</h3>
                <ul>
                <li>Fish</li>
                <li>Milk</li>
                <li>Lasagna</li>
                </ul>
                </section>
                <section>
                    <h2>Cat Form</h2>
                <form id="myCatForm" action="https://freecatphotoapp.com/submit-cat-photo" method="post">
                    <label><input type="radio" name="indoor-outdoor">Indoor</label>
                    <label><input type="radio" name="indoor-outdoor">Outdoor</label>
                    <br>
                    <label><input type="checkbox" name="personality">Loving</label>
                    <label><input type="checkbox" name="personality">Lazy</label>
                    <label><input type="checkbox" name="personality">Crazy</label>
                    <br>
                    <button type="submit">Submit</button>
                </form>
            </section>
        </main>
    </body>
</html>
